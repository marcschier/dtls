name: NativeAOT

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  CI: 'true'

jobs:
  aot-publish:
    name: AOT publish & smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      - name: Publish EchoServer (NativeAOT)
        run: >
          dotnet publish samples/Dtls.EchoServer/Dtls.EchoServer.csproj
          -c Release -r ${{ matrix.rid }} -f net10.0
      - name: Publish EchoClient (NativeAOT)
        run: >
          dotnet publish samples/Dtls.EchoClient/Dtls.EchoClient.csproj
          -c Release -r ${{ matrix.rid }} -f net10.0
      - name: Smoke test (AOT client <-> server loopback)
        shell: pwsh
        run: ./eng/aot-smoke.ps1 -Rid ${{ matrix.rid }}
