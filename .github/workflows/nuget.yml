name: nuget

# Manually mirrors a DtlsSharp package version from the repository's GitHub Packages feed to
# nuget.org using NuGet trusted publishing (OIDC short-lived token — no stored API key). By
# default it mirrors the highest stable version on the feed; an explicit version can be supplied
# as a workflow input. Run from the Actions tab once a version has been published to GitHub
# Packages by the tag-triggered CI job.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Exact DtlsSharp version to mirror to nuget.org. Leave blank to mirror the highest
          stable (non-prerelease) version on the GitHub Packages feed.
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to nuget.org
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # Required for OIDC (NuGet trusted publishing)
      contents: read
      packages: read     # Read the package from the GitHub Packages feed
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve and download the DtlsSharp package from GitHub Packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          id=dtlssharp
          index=https://nuget.pkg.github.com/marcschier/index.json
          auth="Authorization: Bearer ${GH_TOKEN}"
          base=$(curl -fsSL -H "$auth" "$index" \
            | jq -r '.resources[] | select(."@type"=="PackageBaseAddress/3.0.0") | ."@id"' \
            | head -n1)
          base=${base%/}
          # Pick the explicit input if given, otherwise the highest stable (non-prerelease)
          # version on the feed. The feed does not guarantee a sorted "versions" array, so sort
          # numerically instead of taking the last element.
          version="${VERSION_INPUT:-}"
          if [ -z "$version" ]; then
            version=$(curl -fsSL -H "$auth" "$base/$id/index.json" \
              | jq -r '[.versions[] | select(test("-") | not)] | sort_by(split(".") | map(tonumber)) | last // ""')
          fi
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::No stable $id version found on the GitHub Packages feed." >&2
            exit 1
          fi
          echo "Mirroring $id version: $version"
          mkdir -p ./download
          curl -fsSL -H "$auth" "$base/$id/$version/$id.$version.nupkg" \
            -o "./download/$id.$version.nupkg"
          ls -l ./download

      - name: NuGet login (OIDC trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "./download/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
