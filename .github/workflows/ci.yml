name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  CI: 'true'

jobs:
  lint:
    name: Format & line length
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Restore
        run: dotnet restore Dtls.slnx
      - name: Verify formatting
        run: dotnet format Dtls.slnx --verify-no-changes --severity warn
      - name: Check line length (<= 100 columns)
        shell: pwsh
        run: ./eng/check-line-length.ps1

  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: OpenSSL version (interop dependency)
        shell: bash
        run: openssl version
      - name: Restore
        run: dotnet restore Dtls.slnx
      - name: Build
        run: dotnet build Dtls.slnx -c Release --no-restore
      - name: Unit tests
        run: dotnet test tests/Dtls.UnitTests/Dtls.UnitTests.csproj -c Release --no-build
      - name: Integration tests
        run: dotnet test tests/Dtls.IntegrationTests/Dtls.IntegrationTests.csproj -c Release --no-build
      - name: Interop tests (vs OpenSSL)
        run: dotnet test tests/Dtls.Interop.Tests/Dtls.Interop.Tests.csproj -c Release --no-build

  netfx-smoke:
    name: .NET Framework smoke (net48)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Restore
        run: dotnet restore tests/Dtls.NetFxSmokeTests/Dtls.NetFxSmokeTests.csproj
      - name: Build (netstandard2.0 library consumed by net48)
        run: dotnet build tests/Dtls.NetFxSmokeTests/Dtls.NetFxSmokeTests.csproj -c Release --no-restore
      - name: Test (net48 on .NET Framework)
        run: dotnet test tests/Dtls.NetFxSmokeTests/Dtls.NetFxSmokeTests.csproj -c Release --no-build

  mobile-build:
    name: Mobile build (android, ios)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
      - name: Install mobile workloads
        run: dotnet workload install android ios
      - name: Build mobile target frameworks (build-only)
        run: dotnet build src/Dtls/Dtls.csproj -c Release -p:IncludeMobileTargets=true

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [lint, build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Pack
        run: dotnet pack src/Dtls/Dtls.csproj -c Release -o ./artifacts -p:PublicRelease=true
      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --source https://nuget.pkg.github.com/marcschier/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
